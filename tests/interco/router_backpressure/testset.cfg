from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('router_backpressure')
    testset.set_components(["interco.router_v2.backpressure"])

    t = testset.new_make_test('done_passthrough', flags='CASE=done_passthrough',
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Smoke test for the basic decode-and-forward path: with bandwidth=0 "
        "and latency=0 a single read completes in a zero-cycle forward "
        "path (target returns DONE inline, no scheduling involved)."
    )

    t = testset.new_make_test('router_latency', flags='CASE=router_latency',
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Target answers DONE immediately but the router has latency=3. "
        "Verifies that the per-router ``latency`` is honoured — upstream "
        "sees the response at issue_cycle + 3."
    )

    t = testset.new_make_test('mapping_latency', flags='CASE=mapping_latency',
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Per-mapping latency=5 with router latency=0. Verifies the "
        "additive mapping-latency path: total reported latency = "
        "max(input_bw, output_bw) + mapping_latency, i.e. 5 here."
    )

    t = testset.new_make_test('bandwidth', flags='CASE=bandwidth',
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "bandwidth=4, two 16-byte reads issued back-to-back at cycles 10 "
        "and 11. The second forward is throttled by the per-input/per-"
        "output watermarks, so the router schedules it for later via a "
        "ClockEvent — verifies the bandwidth model correctly interacts "
        "with the deferred-send queue."
    )

    t = testset.new_make_test('granted_delay',
                              flags='CASE=target_granted_plus_router_latency',
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Target returns IO_REQ_GRANTED with resp_delay=10, router "
        "latency=3. Verifies that router latency is applied on top of a "
        "deferred target response: upstream sees the resp at "
        "issue + 3 + 10."
    )

    t = testset.new_make_test('denied_retry', flags='CASE=denied_then_retry',
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Target denies every attempt with retry_delay=5. Verifies that "
        "the router propagates DENIED to the master and forwards the "
        "downstream retry() back, exercising the full "
        "deny → wait → retry handshake. The check focuses on the first "
        "deny/retry pair in the log; subsequent iterations would loop."
    )

    t = testset.new_make_test('out_of_mapping', flags='CASE=out_of_mapping',
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Read at 0x20000000, outside any mapping. Router answers "
        "IO_RESP_INVALID without forwarding."
    )

    def _check_one_pending_rule_deny(test, output, *args, **kwargs):
        # Both requests must complete. r0 takes the GRANTED -> RESP path;
        # r1 hits the one-pending-rule deny and only progresses if the
        # router calls retry() on the master once send_handler clears
        # pending_req. If that retry is missing, r1 RESP never appears.
        import re
        if not re.search(r'^\[\d+\] master RESP name=r0\b', output, re.MULTILINE):
            return False, 'r0 never got a RESP'
        if not re.search(r'^\[\d+\] master DENIED name=r1\b', output, re.MULTILINE):
            return False, 'r1 was expected to be DENIED at least once'
        if not re.search(r'^\[\d+\] master RETRY\b', output, re.MULTILINE):
            return False, ('r1 was DENIED but the master never received '
                           'retry() from the router — the router-side fix '
                           'must call in->itf.retry() in send_handler '
                           'after pending_req clears')
        if not re.search(r'^\[\d+\] master RESP name=r1\b', output, re.MULTILINE):
            return False, 'r1 was DENIED, retry fired, but r1 RESP never followed'
        return True, 'r0 + r1 both completed; deny+retry handshake intact'

    t = testset.new_make_test('one_pending_rule_deny',
                              flags='CASE=one_pending_rule_deny',
                              checker=_check_one_pending_rule_deny,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Two requests sent close enough that the second one lands while "
        "the first is still in the deferred-forward window — the second "
        "hits the 'one-pending rule' deny at the top of req_muxed. The "
        "test asserts that the master eventually receives retry() and "
        "the second request completes. Guards against the gap where "
        "send_handler clears pending_req but never calls in->itf.retry()."
    )
